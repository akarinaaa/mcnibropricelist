<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McNibro Shop — Price List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #161b27;
  --card: #1c2333;
  --border: #2a3550;
  --accent: #4ade80;
  --accent2: #60a5fa;
  --gold: #fbbf24;
  --red: #f87171;
  --purple: #c084fc;
  --text: #e2e8f0;
  --muted: #64748b;
  --hover: #243048;
  --p1: #4ade80; --p2: #fbbf24; --p3: #fb923c; --p4: #f87171; --p5: #c084fc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 0%, #1a2744 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 100%, #0d1f1a 0%, transparent 50%);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #0d1520 0%, #111827 50%, #0a1a0f 100%);
  border-bottom: 2px solid var(--border);
  padding: 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 30px #000a;
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; gap: 16px; flex-wrap: wrap;
}
.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: var(--accent);
  text-shadow: 0 0 20px #4ade8088;
  letter-spacing: 1px;
  line-height: 1.4;
}
.logo span { color: var(--gold); }
.server-ip-box {
  display: flex; align-items: center; gap: 10px;
  background: #0a0f1a;
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 16px #4ade8022;
}
.server-ip-box:hover { background: #0f1a2a; box-shadow: 0 0 24px #4ade8044; }
.server-ip-label { color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.server-ip-value { color: var(--accent); font-family: 'Press Start 2P', monospace; font-size: 9px; }
.copy-btn {
  background: var(--accent); color: #000; border: none; border-radius: 4px;
  padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: 'Rajdhani', sans-serif; transition: all 0.15s;
}
.copy-btn:hover { background: #86efac; transform: scale(1.05); }
.copy-btn.copied { background: var(--gold); }
.header-stats {
  display: flex; gap: 16px; align-items: center;
}
.stat-pill {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  font-size: 12px; font-weight: 600; color: var(--muted);
}
.stat-pill span { color: var(--text); font-weight: 700; }

/* CONTROLS */
.controls-wrap {
  max-width: 1200px; margin: 0 auto; padding: 14px 20px;
}
.controls {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  padding: 9px 14px 9px 38px; font-size: 14px; font-family: 'Rajdhani', sans-serif;
  font-weight: 500; outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #4ade8020; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
.filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-label { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap; }
input[type=number] {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); padding: 8px 10px; font-size: 13px; font-family: 'Rajdhani', sans-serif;
  width: 85px; outline: none; transition: border-color 0.2s;
}
input[type=number]:focus { border-color: var(--accent2); }
.btn {
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); padding: 7px 13px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Rajdhani', sans-serif; transition: all 0.15s;
  background: var(--card); white-space: nowrap;
}
.btn:hover { background: var(--hover); border-color: var(--accent2); color: var(--accent2); }
.btn.active { background: var(--accent2); border-color: var(--accent2); color: #000; }
.btn-danger { background: #1f0a0a; border-color: #f8717133; color: var(--red); }
.btn-danger:hover { background: #2d0f0f; border-color: var(--red); }
.btn-compare {
  background: linear-gradient(135deg, #1a0a2e, #2d1458);
  border-color: var(--purple); color: var(--purple);
  position: relative; overflow: hidden;
}
.btn-compare:hover { background: linear-gradient(135deg, #2d1458, #3d1d6b); box-shadow: 0 0 16px #c084fc44; }
.btn-compare .compare-count {
  background: var(--purple); color: #000; border-radius: 10px;
  padding: 1px 6px; font-size: 11px; margin-left: 4px;
}

/* CATEGORY TABS */
.tabs-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px 10px; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'Rajdhani', sans-serif; transition: all 0.15s; color: var(--muted);
}
.tab:hover { border-color: var(--accent); color: var(--accent); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

/* RESULTS INFO */
.results-bar {
  max-width: 1200px; margin: 0 auto; padding: 0 20px 8px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--muted);
}
.results-bar strong { color: var(--accent); }

/* MAIN */
.main { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }

/* SECTION */
.section { margin-bottom: 20px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; gap: 10px;
}
.section-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; color: var(--accent2);
  text-shadow: 0 0 10px #60a5fa66;
  display: flex; align-items: center; gap: 8px;
}
.section-title .emoji { font-size: 14px; }
.section-count { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--muted); margin-left: 6px; }
.section-sort { display: flex; gap: 5px; }
.ssort-btn {
  background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  color: var(--muted); padding: 4px 9px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: 'Rajdhani', sans-serif; transition: all 0.15s;
}
.ssort-btn:hover { border-color: var(--gold); color: var(--gold); }
.ssort-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }
.section-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 5px;
}
.item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 11px; cursor: pointer;
  transition: all 0.15s; position: relative; overflow: hidden; gap: 6px;
}
.item::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 60%, #ffffff05);
  pointer-events: none;
}
.item.in-compare { border-color: var(--purple); background: #1a0d2e; box-shadow: 0 0 10px #c084fc33; }
.item.in-compare::after { content: '✓'; position: absolute; top: 4px; right: 6px; color: var(--purple); font-size: 10px; font-weight: 700; }
.item-name { color: var(--text); font-weight: 600; font-size: 13px; line-height: 1.2; flex: 1; }
.item-cat-tag { font-size: 10px; color: var(--muted); display: block; font-weight: 400; }
.item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.item-price { font-weight: 700; font-size: 13px; white-space: nowrap; }
.add-compare-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 14px; line-height: 1;
  padding: 0; transition: color 0.15s; display: none;
}
.add-compare-btn:hover { color: var(--purple); }

/* Compare mode — enabled when body has .compare-mode */
body.compare-mode .item:hover {
  background: var(--hover); border-color: var(--accent2);
  transform: translateY(-1px); box-shadow: 0 4px 12px #00000066;
}
body.compare-mode .item:hover .add-compare-btn { display: block; }
body.compare-mode .item { cursor: crosshair; }
body.compare-mode .btn-compare {
  background: var(--purple); border-color: var(--purple); color: #000;
  box-shadow: 0 0 20px #c084fc66;
}
body.compare-mode .compare-mode-hint { display: flex; }
.compare-mode-hint {
  display: none; align-items: center; gap: 6px;
  background: #1a0d2e; border: 1px solid var(--purple);
  border-radius: 8px; padding: 6px 12px;
  color: var(--purple); font-size: 12px; font-weight: 600;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.p1{color:var(--p1)} .p2{color:var(--p2)} .p3{color:var(--p3)} .p4{color:var(--p4)} .p5{color:var(--p5)}

/* NO RESULTS */
.no-results {
  text-align: center; padding: 60px 20px; color: var(--muted);
  font-family: 'Press Start 2P', monospace; font-size: 9px; line-height: 2;
}

/* COMPARE TRAY */
.compare-tray {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: linear-gradient(to top, #0a0f1a, var(--surface));
  border-top: 2px solid var(--purple);
  padding: 12px 20px;
  display: none;
  box-shadow: 0 -8px 40px #c084fc22;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.compare-tray-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.tray-label { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--purple); white-space: nowrap; }
.tray-items { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
.tray-item {
  background: #1a0d2e; border: 1px solid var(--purple);
  border-radius: 6px; padding: 5px 10px;
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600;
}
.tray-item-price { color: var(--purple); font-weight: 700; }
.tray-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; transition: color 0.1s; }
.tray-remove:hover { color: var(--red); }
.tray-actions { display: flex; gap: 8px; }
.btn-open-compare {
  background: linear-gradient(135deg, var(--purple), #9333ea);
  border: none; border-radius: 7px; color: #fff;
  padding: 9px 18px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Rajdhani', sans-serif;
  transition: all 0.15s;
}
.btn-open-compare:hover { transform: scale(1.04); box-shadow: 0 0 20px #c084fc66; }
.btn-clear-compare {
  background: var(--card); border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); padding: 9px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Rajdhani', sans-serif; transition: all 0.15s;
}
.btn-clear-compare:hover { border-color: var(--red); color: var(--red); }

/* COMPARE MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: #000000bb; z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--purple);
  border-radius: 16px; width: 100%; max-width: 900px; max-height: 85vh;
  overflow-y: auto; box-shadow: 0 0 80px #c084fc33;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0;
  background: var(--surface); z-index: 1;
}
.modal-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--purple); }
.modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; transition: color 0.15s; line-height: 1; }
.modal-close:hover { color: var(--red); }
.modal-body { padding: 20px 24px; }
.compare-grid { display: grid; gap: 14px; }
.compare-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 20px;
  display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start;
  transition: border-color 0.2s;
}
.compare-card.highest { border-color: var(--accent); box-shadow: 0 0 16px #4ade8022; }
.compare-card.lowest { border-color: var(--red); box-shadow: 0 0 16px #f8717122; }
.compare-card-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.compare-card-cat { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.compare-price-big { font-size: 36px; font-weight: 700; line-height: 1; }
.compare-price-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.compare-bar-wrap { margin-top: 12px; }
.compare-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
.compare-bar-track { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
.compare-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.compare-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; display: inline-block;
}
.badge-cheapest { background: #0a2010; color: var(--accent); border: 1px solid var(--accent); }
.badge-priciest { background: #1f0a0a; color: var(--red); border: 1px solid var(--red); }
.compare-summary {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; margin-top: 16px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px;
}
.summary-stat { text-align: center; }
.summary-val { font-size: 22px; font-weight: 700; }
.summary-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* LEGEND */
.legend {
  max-width: 1200px; margin: 0 auto 20px; padding: 0 20px;
}
.legend-inner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 16px;
  display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  font-size: 12px; font-weight: 600;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* TOAST */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #000; border-radius: 20px;
  padding: 8px 18px; font-size: 13px; font-weight: 700;
  opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 500;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

mark { background: #4ade8033; color: var(--accent); border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="logo">McNibro<br><span>🛒 SHOP</span></div>
    <div class="server-ip-box" onclick="copyIP()">
      <div>
        <div class="server-ip-label">🌐 Server IP</div>
        <div class="server-ip-value">kuma.mcnibro.net</div>
      </div>
      <button class="copy-btn" id="copyBtn">COPY</button>
    </div>
    <div class="header-stats">
      <div class="stat-pill">Items: <span id="totalCount">0</span></div>
      <div class="stat-pill">Compare: <span id="compareCountHeader">0</span>/8</div>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls-wrap">
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search items... e.g. diamond, sword, netherite" oninput="applyFilters()">
    </div>
    <div class="filter-row">
      <span class="filter-label">Min 💰</span>
      <input type="number" id="minPrice" placeholder="0" min="0" oninput="applyFilters()">
      <span class="filter-label">Max 💰</span>
      <input type="number" id="maxPrice" placeholder="∞" min="0" oninput="applyFilters()">
    </div>
    <div class="filter-row">
      <button class="btn" id="sortAsc" onclick="setGlobalSort('asc')">Price ↑</button>
      <button class="btn" id="sortDesc" onclick="setGlobalSort('desc')">Price ↓</button>
      <button class="btn" id="sortAZ" onclick="setGlobalSort('az')">A–Z</button>
      <button class="btn btn-danger" onclick="clearAll()">✕ Clear</button>
      <button class="btn btn-compare" id="compareBtn" onclick="toggleCompareMode()">
        ⚖ Compare <span class="compare-count" id="compareCount">0</span>
      </button>
      <div class="compare-mode-hint" id="compareModeHint">⚡ Click items to compare</div>
    </div>
  </div>
</div>

<!-- CATEGORY TABS -->
<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<!-- RESULTS BAR -->
<div class="results-bar" id="resultsBar" style="display:none">
  <div>Showing <strong id="resultCount">0</strong> results</div>
  <div id="searchHint" style="font-size:12px"></div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-inner">
    <span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px">Price Tier:</span>
    <span class="legend-item"><span class="dot" style="background:var(--p1)"></span><span class="p1">&lt; 10</span> Common</span>
    <span class="legend-item"><span class="dot" style="background:var(--p2)"></span><span class="p2">10–49</span> Uncommon</span>
    <span class="legend-item"><span class="dot" style="background:var(--p3)"></span><span class="p3">50–199</span> Rare</span>
    <span class="legend-item"><span class="dot" style="background:var(--p4)"></span><span class="p4">200–999</span> Epic</span>
    <span class="legend-item"><span class="dot" style="background:var(--p5)"></span><span class="p5">1000+</span> Legendary</span>
    <span style="margin-left:auto;color:var(--muted);font-size:11px">Click item to add to compare</span>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main"></div>

<!-- COMPARE TRAY -->
<div class="compare-tray" id="compareTray">
  <div class="compare-tray-inner">
    <div class="tray-label">⚖ COMPARING</div>
    <div class="tray-items" id="trayItems"></div>
    <div class="tray-actions">
      <button class="btn-open-compare" onclick="openCompare()">View Compare</button>
      <button class="btn-clear-compare" onclick="clearCompare()">Clear All</button>
    </div>
  </div>
</div>

<!-- COMPARE MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeCompare()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚖ PRICE COMPARISON</div>
      <button class="modal-close" onclick="closeCompare()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->

// Init
function init() {
  document.getElementById('totalCount').textContent = ITEMS.length;
  buildTabs();
  renderAll(ITEMS);
}

function pc(p) {
  if (p < 10) return 'p1'; if (p < 50) return 'p2';
  if (p < 200) return 'p3'; if (p < 1000) return 'p4'; return 'p5';
}
function fmt(p) { return p === Math.floor(p) ? p.toString() : p.toString(); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hl(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

// Tabs
function buildTabs() {
  const tabs = document.getElementById('tabs');
  const cats = ['All', ...CAT_ORDER];
  tabs.innerHTML = cats.map(c =>
    `<div class="tab${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c==='All'?'🏪 All':((CAT_EMOJI[c]||'')+'  '+c)}</div>`
  ).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  buildTabs();
  applyFilters();
}

function setGlobalSort(type) {
  globalSort = globalSort === type ? null : type;
  document.querySelectorAll('#sortAsc,#sortDesc,#sortAZ').forEach(b => b.classList.remove('active'));
  if (globalSort) {
    const map = {asc:'sortAsc',desc:'sortDesc',az:'sortAZ'};
    document.getElementById(map[globalSort]).classList.add('active');
  }
  applyFilters();
}

function setSectionSort(cat, type, btn) {
  const cur = sectionSorts[cat];
  sectionSorts[cat] = cur === type ? null : type;
  document.querySelectorAll(`.ssort-btn[data-cat="${CSS.escape(cat)}"]`).forEach(b => b.classList.remove('active'));
  if (sectionSorts[cat]) btn.classList.add('active');
  applyFilters();
}

// Filters
function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const minV = parseFloat(document.getElementById('minPrice').value);
  const maxV = parseFloat(document.getElementById('maxPrice').value);
  const hasMin = !isNaN(minV), hasMax = !isNaN(maxV);
  const hasFilters = q || hasMin || hasMax || globalSort || activeCategory !== 'All';

  let filtered = ITEMS.filter(item => {
    if (activeCategory !== 'All' && item.cat !== activeCategory) return false;
    if (q && !item.name.toLowerCase().includes(q)) return false;
    if (hasMin && item.price < minV) return false;
    if (hasMax && item.price > maxV) return false;
    return true;
  });

  document.getElementById('resultsBar').style.display = hasFilters ? 'flex' : 'none';
  document.getElementById('resultCount').textContent = filtered.length;
  document.getElementById('searchHint').textContent = q ? `Searching for "${q}"` : '';

  if (globalSort) {
    if (globalSort === 'asc') filtered.sort((a,b) => a.price - b.price);
    else if (globalSort === 'desc') filtered.sort((a,b) => b.price - a.price);
    else filtered.sort((a,b) => a.name.localeCompare(b.name));
  }

  renderAll(filtered, q);
}

// Render
function renderAll(items, q = '') {
  const main = document.getElementById('main');
  if (items.length === 0) {
    main.innerHTML = '<div class="no-results">😔 No items found<br><br>Try a different search</div>';
    return;
  }

  const isGrouped = !globalSort || activeCategory !== 'All';
  if (globalSort && activeCategory === 'All' && !document.getElementById('searchInput').value && !document.getElementById('minPrice').value && !document.getElementById('maxPrice').value) {
    // flat sorted view
    main.innerHTML = renderFlatSection('All Items', items, q, 'all');
    return;
  }

  // Group by category
  const groups = {};
  CAT_ORDER.forEach(c => { groups[c] = []; });
  items.forEach(item => { if (!groups[item.cat]) groups[item.cat] = []; groups[item.cat].push(item); });

  let html = '';
  CAT_ORDER.forEach(cat => {
    const catItems = groups[cat];
    if (!catItems || catItems.length === 0) return;
    html += renderSection(cat, catItems, q);
  });
  main.innerHTML = html || '<div class="no-results">😔 No items found</div>';
  attachSortListeners();
}

function renderSection(cat, items, q) {
  const sort = sectionSorts[cat];
  let sorted = [...items];
  if (sort === 'asc') sorted.sort((a,b) => a.price - b.price);
  else if (sort === 'desc') sorted.sort((a,b) => b.price - a.price);
  else if (sort === 'az') sorted.sort((a,b) => a.name.localeCompare(b.name));
  else sorted.sort((a,b) => a.name.localeCompare(b.name));

  const em = CAT_EMOJI[cat] || '📦';
  const catEsc = cat.replace(/"/g,'&quot;');
  return `
<div class="section" id="sec-${cat.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'')}">
  <div class="section-header">
    <div class="section-title">
      <span class="emoji">${em}</span> ${cat}
      <span class="section-count">${items.length}</span>
    </div>
    <div class="section-line"></div>
    <div class="section-sort">
      <button class="ssort-btn${sort==='az'?' active':''}" data-cat="${catEsc}" data-type="az" title="Sort A-Z">A–Z</button>
      <button class="ssort-btn${sort==='asc'?' active':''}" data-cat="${catEsc}" data-type="asc" title="Sort Price Low">💰↑</button>
      <button class="ssort-btn${sort==='desc'?' active':''}" data-cat="${catEsc}" data-type="desc" title="Sort Price High">💰↓</button>
    </div>
  </div>
  <div class="grid">${sorted.map(item => renderItem(item, q)).join('')}</div>
</div>`;
}

function renderFlatSection(title, items, q, id) {
  return `<div class="section"><div class="grid">${items.map(item => renderItem(item, q, true)).join('')}</div></div>`;
}

function renderItem(item, q, showCat = false) {
  const inCmp = compareList.some(c => c.name === item.name);
  const nameHtml = hl(item.name, q);
  const p = pc(item.price);
  const safeN = item.name.replace(/'/g,"\\'");
  return `<div class="item${inCmp?' in-compare':''}" onclick="handleItemClick('${safeN}',${item.price},'${item.cat.replace(/'/g,"\\'")}')">
  <div class="item-name">${nameHtml}${showCat?`<span class="item-cat-tag">${item.cat}</span>`:''}</div>
  <div class="item-right">
    <span class="item-price ${p}">💰 ${fmt(item.price)}</span>
    <button class="add-compare-btn" title="Add to compare">+</button>
  </div>
</div>`;
}

function attachSortListeners() {
  document.querySelectorAll('.ssort-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const cat = btn.dataset.cat;
      const type = btn.dataset.type;
      const cur = sectionSorts[cat];
      sectionSorts[cat] = cur === type ? null : type;
      document.querySelectorAll(`.ssort-btn[data-cat="${CSS.escape(cat)}"]`).forEach(b => b.classList.remove('active'));
      if (sectionSorts[cat]) btn.classList.add('active');
      applyFilters();
    });
  });
}

// Compare Mode Toggle
let compareModeOn = false;
function toggleCompareMode() {
  if (compareModeOn && compareList.length > 0) {
    openCompare(); return;
  }
  compareModeOn = !compareModeOn;
  document.body.classList.toggle('compare-mode', compareModeOn);
  if (!compareModeOn && compareList.length === 0) {
    showToast('Compare mode OFF');
  } else if (compareModeOn) {
    showToast('⚡ Compare mode ON — click items!');
  }
}

function handleItemClick(name, price, cat) {
  if (!compareModeOn) return;
  toggleCompare(name, price, cat);
}

// Compare
function toggleCompare(name, price, cat) {
  const idx = compareList.findIndex(c => c.name === name);
  if (idx >= 0) {
    compareList.splice(idx, 1);
    showToast(`Removed: ${name}`);
  } else {
    if (compareList.length >= 8) { showToast('⚠ Max 8 items to compare!'); return; }
    compareList.push({ name, price, cat });
    showToast(`Added: ${name}`);
  }
  updateCompareTray();
  applyFilters();
}

function updateCompareTray() {
  const tray = document.getElementById('compareTray');
  const trayItems = document.getElementById('trayItems');
  const count = compareList.length;
  document.getElementById('compareCount').textContent = count;
  document.getElementById('compareCountHeader').textContent = count;

  if (count === 0) { tray.style.display = 'none'; return; }
  tray.style.display = 'block';
  trayItems.innerHTML = compareList.map(item => `
    <div class="tray-item">
      ${esc(item.name)} <span class="tray-item-price">💰${fmt(item.price)}</span>
      <button class="tray-remove" onclick="event.stopPropagation();toggleCompare('${item.name.replace(/'/g,"\\'")}',${item.price},'${item.cat.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}

function clearCompare() {
  compareList = [];
  updateCompareTray();
  applyFilters();
}

function openCompare() {
  if (compareList.length === 0) { showToast('Add items to compare first!'); return; }
  const modal = document.getElementById('modal');
  const body = document.getElementById('modalBody');
  modal.classList.add('open');

  const maxPrice = Math.max(...compareList.map(i => i.price));
  const minPrice = Math.min(...compareList.map(i => i.price));
  const avgPrice = compareList.reduce((s,i) => s+i.price, 0) / compareList.length;
  const totalPrice = compareList.reduce((s,i) => s+i.price, 0);

  const sorted = [...compareList].sort((a,b) => a.price - b.price);

  body.innerHTML = `
    <div class="compare-grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">
      ${compareList.map(item => {
        const isMax = item.price === maxPrice && compareList.filter(i=>i.price===maxPrice).length < compareList.length;
        const isMin = item.price === minPrice && compareList.filter(i=>i.price===minPrice).length < compareList.length;
        const barPct = maxPrice > 0 ? Math.round((item.price/maxPrice)*100) : 100;
        const barColor = item.price === maxPrice ? 'var(--red)' : item.price === minPrice ? 'var(--accent)' : 'var(--accent2)';
        return `<div class="compare-card${isMax?' highest':isMin?' lowest':''}">
          <div>
            <div class="compare-card-name">${esc(item.name)}</div>
            <div class="compare-card-cat">${esc(item.cat)}</div>
            ${isMin ? '<span class="compare-badge badge-cheapest">✓ Cheapest</span>' : ''}
            ${isMax ? '<span class="compare-badge badge-priciest">⬆ Priciest</span>' : ''}
            <div class="compare-bar-wrap">
              <div class="compare-bar-label">Relative Price</div>
              <div class="compare-bar-track">
                <div class="compare-bar-fill" style="width:${barPct}%;background:${barColor}"></div>
              </div>
            </div>
          </div>
          <div>
            <div class="compare-price-big ${pc(item.price)}">💰${fmt(item.price)}</div>
            <div class="compare-price-label">per item</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="compare-summary">
      <div class="summary-stat">
        <div class="summary-val p1">💰${fmt(minPrice)}</div>
        <div class="summary-lbl">Cheapest</div>
      </div>
      <div class="summary-stat">
        <div class="summary-val p4">💰${fmt(maxPrice)}</div>
        <div class="summary-lbl">Priciest</div>
      </div>
      <div class="summary-stat">
        <div class="summary-val p2">💰${fmt(Math.round(avgPrice*100)/100)}</div>
        <div class="summary-lbl">Average</div>
      </div>
      <div class="summary-stat">
        <div class="summary-val p3">💰${fmt(Math.round(totalPrice*100)/100)}</div>
        <div class="summary-lbl">Total (${compareList.length} items)</div>
      </div>
      <div class="summary-stat">
        <div class="summary-val" style="color:var(--accent2)">💰${fmt(Math.round((maxPrice-minPrice)*100)/100)}</div>
        <div class="summary-lbl">Price Difference</div>
      </div>
    </div>`;
}

function closeCompare() {
  document.getElementById('modal').classList.remove('open');
}

// Copy IP
function copyIP() {
  navigator.clipboard.writeText('kuma.mcnibro.net').then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED!'; btn.classList.add('copied');
    showToast('✅ IP Copied: kuma.mcnibro.net');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
  });
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Clear
function clearAll() {
  document.getElementById('searchInput').value = '';
  document.getElementById('minPrice').value = '';
  document.getElementById('maxPrice').value = '';
  globalSort = null; sectionSorts = {}; activeCategory = 'All';
  compareModeOn = false; document.body.classList.remove('compare-mode');
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  buildTabs(); applyFilters();
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.key === '/' || e.key === 'f') && !e.target.matches('input')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') closeCompare();
});

init();
</script>
</body>
</html>
