<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McNibro — Firebase Importer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --surface: #161b27; --card: #1c2333; --border: #2a3550;
  --accent: #4ade80; --accent2: #60a5fa; --gold: #fbbf24; --red: #f87171;
  --text: #e2e8f0; --muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; min-height: 100vh; padding: 30px 20px; }
h1 { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--accent); text-shadow: 0 0 20px #4ade8066; margin-bottom: 6px; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 30px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 760px; margin: 0 auto 20px; }
.card h2 { font-size: 14px; font-weight: 700; color: var(--accent2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
.stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; text-align: center; flex: 1; min-width: 120px; }
.stat-val { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.btn-import {
  display: block; width: 100%;
  background: linear-gradient(135deg, #14532d, #166534);
  border: 1px solid var(--accent); border-radius: 10px; color: var(--accent);
  padding: 16px; font-size: 15px; font-weight: 700; font-family: 'Rajdhani', sans-serif;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
}
.btn-import:hover { background: linear-gradient(135deg, #166534, #15803d); box-shadow: 0 0 24px #4ade8044; transform: translateY(-1px); }
.btn-import:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-clear {
  display: block; width: 100%; margin-top: 10px;
  background: #1f0a0a; border: 1px solid #f8717133; border-radius: 10px;
  color: var(--red); padding: 12px; font-size: 14px; font-weight: 700;
  font-family: 'Rajdhani', sans-serif; cursor: pointer; transition: all 0.2s;
}
.btn-clear:hover { background: #2d0f0f; border-color: var(--red); }
.btn-clear:disabled { opacity: 0.4; cursor: not-allowed; }
.log-wrap { background: #0a0f1a; border: 1px solid var(--border); border-radius: 8px; padding: 14px; height: 280px; overflow-y: auto; font-size: 12px; font-family: monospace; }
.log-line { margin-bottom: 4px; line-height: 1.5; }
.log-ok { color: var(--accent); }
.log-err { color: var(--red); }
.log-info { color: var(--accent2); }
.log-warn { color: var(--gold); }
.log-dim { color: var(--muted); }
.progress-bar { background: var(--card); border-radius: 4px; height: 8px; overflow: hidden; margin: 12px 0; display: none; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s ease; width: 0%; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 8px; }
.badge-ready { background: #0a2010; color: var(--accent); border: 1px solid var(--accent); }
.badge-done { background: #0a2010; color: var(--accent); border: 1px solid var(--accent); }
.badge-error { background: #1f0a0a; color: var(--red); border: 1px solid var(--red); }
.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.preview-table th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
.preview-table td { padding: 5px 8px; border-bottom: 1px solid #1e2a3a; color: var(--text); }
.preview-table tr:last-child td { border-bottom: none; }
.preview-table td.price { color: var(--gold); font-weight: 700; }
.preview-table td.cat { color: var(--accent2); }
.preview-scroll { max-height: 240px; overflow-y: auto; }
.section-divider { margin: 10px 0; border: none; border-top: 1px solid var(--border); }

/* LOGIN */
.login-card { background: var(--surface); border: 1px solid var(--accent2); border-radius: 12px; padding: 28px; max-width: 760px; margin: 0 auto 20px; }
.login-card h2 { font-size: 14px; font-weight: 700; color: var(--accent2); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
.login-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.login-field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
.login-field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
.login-field input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 13px; font-size: 14px; font-family: 'Rajdhani', sans-serif; outline: none; transition: border-color 0.2s; }
.login-field input:focus { border-color: var(--accent2); }
.btn-login { background: linear-gradient(135deg, #1e3a5f, #1d4ed8); border: 1px solid var(--accent2); border-radius: 8px; color: var(--accent2); padding: 10px 22px; font-size: 14px; font-weight: 700; font-family: 'Rajdhani', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-login:hover { background: linear-gradient(135deg, #1d4ed8, #2563eb); box-shadow: 0 0 16px #60a5fa44; }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.login-err { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }
.auth-bar { background: #0a1a0a; border: 1px solid var(--accent); border-radius: 8px; padding: 10px 16px; max-width: 760px; margin: 0 auto 16px; display: none; align-items: center; justify-content: space-between; gap: 10px; }
.auth-bar.visible { display: flex; }
.auth-user { color: var(--accent); font-size: 13px; font-weight: 600; }
.btn-signout { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 5px 12px; font-size: 12px; font-weight: 600; font-family: 'Rajdhani', sans-serif; cursor: pointer; transition: all 0.15s; }
.btn-signout:hover { border-color: var(--red); color: var(--red); }
.main-content { display: none; }
.main-content.visible { display: block; }
</style>
</head>
<body>

<div style="max-width:760px;margin:0 auto">
  <h1>McNibro</h1>
  <div class="subtitle">🔥 Firebase Importer — items from index_old.html → Firestore</div>

  <!-- LOGIN -->
  <div class="login-card" id="loginCard">
    <h2>🔐 Sign In to Firebase</h2>
    <div class="login-row">
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@mcnibro.net" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Sign In</button>
    </div>
    <div class="login-err" id="loginErr"></div>
  </div>

  <!-- AUTH BAR (shown when logged in) -->
  <div class="auth-bar" id="authBar">
    <span class="auth-user" id="authUser">👤 </span>
    <button class="btn-signout" onclick="doSignOut()">Sign Out</button>
  </div>

  <!-- MAIN CONTENT (shown when logged in) -->
  <div class="main-content" id="mainContent">

  <div class="card">
    <h2>📦 Items to Import <span class="badge badge-ready" id="readyBadge">READY</span></h2>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="statItems">0</div><div class="stat-lbl">Total Items</div></div>
      <div class="stat-box"><div class="stat-val" id="statCats">0</div><div class="stat-lbl">Categories</div></div>
      <div class="stat-box"><div class="stat-val" id="statDone">0</div><div class="stat-lbl">Imported</div></div>
      <div class="stat-box"><div class="stat-val" id="statFail">0</div><div class="stat-lbl">Failed</div></div>
    </div>

    <div class="preview-scroll">
      <table class="preview-table">
        <thead><tr><th>#</th><th>Name</th><th>Price</th><th>Category</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>🚀 Import Actions</h2>
    <button class="btn-import" id="btnImport" onclick="runImport()">
      ⬆ Import All Items to Firebase
    </button>
    <button class="btn-clear" id="btnClear" onclick="runClear()">
      🗑 Clear All Items from Firebase (Danger!)
    </button>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="card">
    <h2>📋 Log</h2>
    <div class="log-wrap" id="logWrap"></div>
  </div>

  </div><!-- /main-content -->
</div>

// ── Auth UI ────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginCard').style.display    = 'none';
    document.getElementById('authBar').classList.add('visible');
    document.getElementById('mainContent').classList.add('visible');
    document.getElementById('authUser').textContent = '👤 ' + user.email;
    log(`Signed in as ${user.email}`, 'ok');
  } else {
    document.getElementById('loginCard').style.display    = 'block';
    document.getElementById('authBar').classList.remove('visible');
    document.getElementById('mainContent').classList.remove('visible');
  }
});

window.doLogin = async function () {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('btnLogin');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Please fill in both fields.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    errEl.textContent =
      e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' ? 'Wrong email or password.' :
      e.code === 'auth/user-not-found'     ? 'No account found with that email.' :
      e.code === 'auth/too-many-requests'  ? 'Too many attempts. Try again later.' :
      e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
};

window.doSignOut = async function () {
  await signOut(auth);
};

// ── UI helpers ─────────────────────────────────────────────────────────────
function log(msg, type = 'info') {
  const wrap = document.getElementById('logWrap');
  const line = document.createElement('div');
  line.className = `log-line log-${type}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  wrap.appendChild(line);
  wrap.scrollTop = wrap.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateCounters(done, fail) {
  document.getElementById('statDone').textContent = done;
  document.getElementById('statFail').textContent = fail;
}

// ── Build preview table ─────────────────────────────────────────────────────
const cats = [...new Set(ITEMS.map(i => i.cat))];
document.getElementById('statItems').textContent = ITEMS.length;
document.getElementById('statCats').textContent = cats.length;

const tbody = document.getElementById('previewBody');
ITEMS.slice(0, 50).forEach((item, idx) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td style="color:var(--muted)">${idx+1}</td><td>${item.name}</td><td class="price">💰 ${item.price}</td><td class="cat">${item.cat}</td>`;
  tbody.appendChild(tr);
});
if (ITEMS.length > 50) {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td colspan="4" style="color:var(--muted);text-align:center;padding:10px">… and ${ITEMS.length - 50} more items</td>`;
  tbody.appendChild(tr);
}

// ── Generate a safe Firestore document ID from item name ───────────────────
function makeId(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
}

// ── IMPORT ──────────────────────────────────────────────────────────────────
window.runImport = async function () {
  const btn = document.getElementById('btnImport');
  btn.disabled = true;
  btn.textContent = '⏳ Importing…';
  document.getElementById('btnClear').disabled = true;

  log(`Starting import of ${ITEMS.length} items into Firestore collection "items"…`, 'info');

  let done = 0, fail = 0;
  const BATCH_SIZE = 500; // Firestore max per batch

  try {
    for (let i = 0; i < ITEMS.length; i += BATCH_SIZE) {
      const chunk = ITEMS.slice(i, i + BATCH_SIZE);
      const batch = writeBatch(db);

      chunk.forEach(item => {
        const id = makeId(item.name);
        const ref = doc(collection(db, 'items'), id);
        batch.set(ref, {
          name: item.name,
          price: item.price,
          cat: item.cat,
          updatedAt: new Date().toISOString()
        });
      });

      await batch.commit();
      done += chunk.length;
      updateCounters(done, fail);
      setProgress(Math.round((done / ITEMS.length) * 100));
      log(`✅ Batch committed: ${done}/${ITEMS.length} items`, 'ok');
    }

    log(`🎉 Import complete! ${done} items written to Firestore.`, 'ok');
    document.getElementById('readyBadge').textContent = 'DONE';
    document.getElementById('readyBadge').className = 'badge badge-done';
    btn.textContent = '✅ Import Complete';
  } catch (err) {
    fail++;
    updateCounters(done, fail);
    log(`❌ Error: ${err.message}`, 'err');
    log('Make sure Firestore rules allow writes (or you are authenticated).', 'warn');
    document.getElementById('readyBadge').textContent = 'ERROR';
    document.getElementById('readyBadge').className = 'badge badge-error';
    btn.disabled = false;
    btn.textContent = '⬆ Retry Import';
  } finally {
    document.getElementById('btnClear').disabled = false;
  }
};

// ── CLEAR ───────────────────────────────────────────────────────────────────
window.runClear = async function () {
  if (!confirm(`⚠️ This will DELETE ALL documents in the "items" collection.\n\nAre you sure?`)) return;

  const btn = document.getElementById('btnClear');
  btn.disabled = true;
  document.getElementById('btnImport').disabled = true;
  log('🗑 Fetching all items to delete…', 'warn');

  try {
    const snap = await getDocs(collection(db, 'items'));
    if (snap.empty) { log('Collection is already empty.', 'info'); return; }

    let deleted = 0;
    const docs = snap.docs;
    for (let i = 0; i < docs.length; i += 500) {
      const batch = writeBatch(db);
      docs.slice(i, i + 500).forEach(d => batch.delete(d.ref));
      await batch.commit();
      deleted += Math.min(500, docs.length - i);
      log(`🗑 Deleted ${deleted}/${docs.length}…`, 'warn');
      setProgress(Math.round((deleted / docs.length) * 100));
    }
    log(`✅ Cleared ${deleted} documents from "items".`, 'ok');
    updateCounters(0, 0);
  } catch (err) {
    log(`❌ Clear error: ${err.message}`, 'err');
  } finally {
    btn.disabled = false;
    document.getElementById('btnImport').disabled = false;
  }
};

log(`Loaded ${ITEMS.length} items across ${cats.length} categories. Ready to import!`, 'info');
</script>
